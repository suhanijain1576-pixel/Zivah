<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zivah</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f8f8f8;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(90deg, #000, #444);
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h1 {
    margin: 0;
    letter-spacing: 2px;
}

.nav-links a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

.nav-links a:hover {
    color: #ff4d6d;
}

/* HERO */
.hero {
    background: url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd53') no-repeat center/cover;
    height: 250px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 30px;
    font-weight: bold;
}

/* SECTION */
section {
    padding: 20px;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #ff4d6d;
    font-weight: bold;
}

button {
    background: #000;
    color: white;
    padding: 10px 15px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #ff4d6d;
}

/* FOOTER */
footer {
    background: #000;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<div class="navbar">
    <h1>ZIVAH</h1>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </div>
</div>

<div class="hero">
    Discover Your Style ✨
</div>

<section>
<h2>About Us</h2>
<p>Zivah is a modern clothing brand offering stylish outfits for all occasions.</p>
</section>

<section>
<h2>Products</h2>

<div class="products">

<div class="card">
    <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
    <h3>Anarkali Suit</h3>
    <p class="price">₹2500</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1583391733956-6c78276477e2">
    <h3>Kurti</h3>
    <p class="price">₹1200</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
    <h3>Lehenga</h3>
    <p class="price">₹5000</p>
    <button>Add to Cart</button>
</div>

</div>
</section>

<section>
<h2>Contact</h2>
<p>Email: contact@zivah.com</p>
</section>

<footer>
© 2026 Zivah
</footer>

</body>
</html>
